<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Event English Phrases - Flashcards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tech Event Phrases</h1>
            <p>Basic phrases for networking at tech events</p>
        </div>

        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front">
                    <div class="category" id="category-front"></div>
                    <div class="phrase" id="phrase"></div>
                    <div class="situation" id="situation"></div>
                </div>
                <div class="card-face card-back">
                    <div class="category" id="category-back"></div>
                    <div class="translation" id="translation"></div>
                    <div class="example" id="example"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prev-btn" id="prev-btn">Previous</button>
            <button id="shuffle-btn" id="shuffle-btn">Shuffle</button>
            <button id="next-btn" id="next-btn">Next</button>
        </div>

        <div class="progress" id="progress"></div>

        <div class="flip-hint">Tap to flip card</div>
    </div>
</body>
</html>
